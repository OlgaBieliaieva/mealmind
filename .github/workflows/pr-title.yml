name: PR title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Conventional PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node <<'NODE'
          const title = process.env.PR_TITLE ?? "";

          const pattern =
            /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9][a-z0-9-]*\))?: \S(?:.*\S)?$/;

          if (!pattern.test(title)) {
            console.error(`Invalid pull request title: ${JSON.stringify(title)}`);
            console.error("");
            console.error("Expected format:");
            console.error("  type(optional-scope): description");
            console.error("");
            console.error("Allowed types:");
            console.error(
              "  feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert",
            );
            console.error("");
            console.error("Examples:");
            console.error("  feat(api): add recipe endpoint");
            console.error("  test(web-client): add meal plan tests");
            console.error("  ci: add pull request quality gates");

            process.exit(1);
          }

          console.log(`Valid pull request title: ${JSON.stringify(title)}`);
          NODE
